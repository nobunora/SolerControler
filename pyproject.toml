[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = [
    "google.auth.*",
    "google.cloud.*",
    "googleapiclient.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "app.utils",
    "app.constants",
    "app.time_windows",
    "app.tariff",
    "app.monitoring_csv",
    "app.night_plan",
    "app.settings.*",
]
strict = true
